name: Build Windows Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build application (PyInstaller)
        run: |
          pyinstaller --noconfirm --windowed --name MediaPlayer --collect-submodules accessible_output2 --collect-data accessible_output2 --collect-data ytmusicapi src/main.py

      - name: Build updater (PyInstaller)
        run: |
          pyinstaller --noconfirm --onefile --windowed --name MediaPlayerUpdater src/updater_main.py

      - name: Bundle updater into dist
        shell: powershell
        run: |
          Copy-Item -Path "dist\MediaPlayerUpdater.exe" -Destination "dist\MediaPlayer\MediaPlayerUpdater.exe" -Force

      - name: Download libmpv runtime
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $release = Invoke-RestMethod -Headers @{ "User-Agent" = "GitHub-Actions" } -Uri "https://api.github.com/repos/zhongfly/mpv-winbuild/releases/latest"
          $preferredAssetPattern = '^mpv-dev-x86_64-\d{8}-git-[0-9a-f]+\.7z$'
          $asset = $release.assets |
            Where-Object { $_.name -match $preferredAssetPattern } |
            Sort-Object -Property name -Descending |
            Select-Object -First 1

          if (-not $asset) {
            $availableAssets = ($release.assets | Select-Object -ExpandProperty name) -join ', '
            throw "Não foi possível localizar um asset compatível com o padrão '$preferredAssetPattern' na release mais recente do mpv-winbuild. Assets disponíveis: $availableAssets"
          }

          New-Item -Path "build\mpv-runtime" -ItemType Directory -Force | Out-Null
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile "build\mpv-runtime\libmpv.7z"
          & 7z x "build\mpv-runtime\libmpv.7z" "-obuild\mpv-runtime\extracted" -y | Out-Null

      - name: Bundle MPV runtime into dist
        shell: powershell
        run: |
          $mpvDll = Get-ChildItem -Path "build\mpv-runtime\extracted" -Filter "libmpv-2.dll" -Recurse -ErrorAction SilentlyContinue |
            Select-Object -First 1
          if (-not $mpvDll) {
            throw "Runtime libmpv não encontrado nos arquivos baixados do mpv-winbuild"
          }

          $mpvSource = $mpvDll.Directory.FullName
          $targetRoot = "dist\MediaPlayer\mpv"
          New-Item -Path $targetRoot -ItemType Directory -Force | Out-Null
          Copy-Item -Path "$mpvSource\*" -Destination $targetRoot -Recurse -Force

          $licenseDir = "dist\MediaPlayer\THIRD_PARTY_LICENSES"
          New-Item -Path $licenseDir -ItemType Directory -Force | Out-Null

          $possibleLicenseFiles = @(
            "$mpvSource\LICENSE.txt",
            "$mpvSource\COPYING.txt",
            "$mpvSource\COPYING"
          )

          foreach ($file in $possibleLicenseFiles) {
            if (Test-Path $file) {
              Copy-Item -Path $file -Destination $licenseDir -Force
            }
          }

      - name: Create release archive
        shell: powershell
        run: |
          $archiveName = "MediaPlayer-windows.zip"
          if (Test-Path $archiveName) {
            Remove-Item $archiveName -Force
          }
          Compress-Archive -Path "dist\MediaPlayer\*" -DestinationPath $archiveName

      - name: Create release checksum
        shell: powershell
        run: |
          $archiveName = "MediaPlayer-windows.zip"
          $checksumFile = "$archiveName.sha256"
          $hash = (Get-FileHash -Path $archiveName -Algorithm SHA256).Hash.ToLowerInvariant()
          Set-Content -Path $checksumFile -Value "$hash  $archiveName" -Encoding ascii

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: MediaPlayer-windows
          path: |
            MediaPlayer-windows.zip
            MediaPlayer-windows.zip.sha256

      - name: Publish zip to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            MediaPlayer-windows.zip
            MediaPlayer-windows.zip.sha256
          generate_release_notes: true